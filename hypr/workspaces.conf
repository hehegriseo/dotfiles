# ═══════════════════════ NAMED WORKSPACES ═══════════════════════
# Dev workflow layout:
#   1  󰨞 DEV   – code editor, build terminals
#   2  󰄛 TERM  – general terminal work
#   3  󰈹 WEB   – browser, devtools
#   4  󰙯 CHAT  – discord, slack
#   5  󰝚 MEDIA – music, video, spotify
#   6-9        – scratch / overflow

workspace = 1, name:󰨞 DEV
workspace = 2, name:󰄛 TERM
workspace = 3, name:󰈹 WEB
workspace = 4, name:󰙯 CHAT
workspace = 5, name:󰝚 MEDIA

# ── App-to-workspace assignments ───────────────────────────────

# Browser always on WEB
windowrule = match:class firefox, workspace 3
windowrule = match:class google-chrome, workspace 3
windowrule = match:class brave, workspace 3
windowrule = match:class chromium, workspace 3

# Chat on CHAT
windowrule = match:class discord, workspace 4
windowrule = match:class Slack, workspace 4
windowrule = match:class vesktop, workspace 4
windowrule = match:class telegram-desktop, workspace 4

# Music / media on MEDIA
windowrule = match:class spotify, workspace 5
windowrule = match:class Spotify, workspace 5
windowrule = match:class vlc, workspace 5

# Keep dev tools on DEV
windowrule = match:class Code, workspace 1
windowrule = match:class code-oss, workspace 1
windowrule = match:class nvim, workspace 1
windowrule = match:class jetbrains-idea, workspace 1
windowrule = match:class jetbrains-idea-ce, workspace 1
