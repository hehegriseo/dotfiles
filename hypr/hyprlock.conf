general {
    hide_cursor = true
    grace = 1
    disable_loading_bar = true
}

background {
    monitor =
    path = screenshot

    blur_passes = 4
    blur_size = 10

    noise = 0.01
    contrast = 1.1
    brightness = 0.82
    vibrancy = 0.18
    vibrancy_darkness = 0.2
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"

    color = rgba(255,255,255,0.96)

    font_size = 112
    font_family = SF Pro Display Bold

    position = 0, 230

    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"

    color = rgba(255,255,255,0.72)

    font_size = 24
    font_family = SF Pro Display Medium

    position = 0, 160

    halign = center
    valign = center
}

# GLASS PANEL
shape {
    monitor =
    size = 420, 140

    color = rgba(255,255,255,0.08)

    rounding = 28

    border_size = 1
    border_color = rgba(255,255,255,0.12)

    position = 0, -120

    halign = center
    valign = center
}

# INNER HIGHLIGHT
shape {
    monitor =
    size = 418, 138

    color = rgba(255,255,255,0.02)

    rounding = 28

    position = 0, -120

    halign = center
    valign = center
}

# PASSWORD BOX
input-field {
    monitor =

    size = 340, 58

    outline_thickness = 0

    outer_color = rgba(0,0,0,0)
    inner_color = rgba(255,255,255,0.02)

    font_color = rgba(255,255,255,0.96)

    fade_on_empty = false

    rounding = 18

    placeholder_text = Password

    dots_center = true
    dots_size = 0.22
    dots_spacing = 0.32

    check_color = rgba(255,255,255,0.9)
    fail_color = rgba(255,120,120,0.9)

    position = 0, -120

    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER

    color = rgba(255,255,255,0.5)

    font_size = 16
    font_family = SF Pro Display Medium

    position = 0, -205

    halign = center
    valign = center
}
